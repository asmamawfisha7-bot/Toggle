<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Example</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* Sidebar container */
  .sidebar {
    height: 100vh; /* full height */
    width: 250px; /* sidebar width */
    position: fixed;
    top: 0;
    left: 0;
    background-color: #2c3e50;
    padding-top: 20px;
    transition: 0.3s;
  }

  /* Sidebar links */
  .sidebar a {
    display: block;
    color: white;
    padding: 15px 20px;
    text-decoration: none;
    font-size: 18px;
  }

  /* Hover effect */
  .sidebar a:hover {
    background-color: #34495e;
  }

  /* Main content */
  .main {
    margin-left: 250px; /* same as sidebar width */
    padding: 20px;
  }

  /* Responsive: collapse sidebar on small screens */
  @media screen and (max-width: 768px) {
    .sidebar {
      width: 200px;
    }
    .main {
      margin-left: 200px;
    }
  }
</style>
</head>
<body>

<div class="sidebar">
  <a href="#home">🏠 Home</a>
  <a href="#courses">📚 Courses</a>
  <a href="#about">ℹ️ About</a>
  <a href="#contact">✉️ Contact</a>
</div>

<div class="main">
  <h1>Welcome to Ethael Web Academy</h1>
  <p>This is your main content area. You can add HTML, images, videos, or even your course list here.</p>
</div>

</body>
</html>
